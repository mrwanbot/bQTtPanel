<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bQTtPanel</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#0b1020;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      width:350px;
      background:#141b2d;
      padding:30px;
      border-radius:20px;
      text-align:center;
      box-shadow:0 0 20px rgba(0,0,0,.4);
    }

    h1{
      color:#2ea8ff;
      margin-bottom:25px;
      font-size:38px;
    }

    input{
      width:100%;
      padding:15px;
      margin:10px 0;
      border:none;
      border-radius:12px;
      background:#20283d;
      color:#fff;
      font-size:16px;
    }

    button{
      width:100%;
      padding:15px;
      margin-top:15px;
      border:none;
      border-radius:12px;
      background:linear-gradient(90deg,#19c2ff,#7b4dff);
      color:white;
      font-size:18px;
      cursor:pointer;
    }

    p{
      color:#8fa8d8;
      margin-top:18px;
    }
  </style>

</head>
<body>

<div class="box">

<h1>bQTtPanel</h1>

<input type="email" placeholder="البريد الإلكتروني">

<input type="password" placeholder="كلمة المرور">

<button>تسجيل الدخول</button>

<p>إنشاء حساب</p>

</div>

</body>
    </html>
